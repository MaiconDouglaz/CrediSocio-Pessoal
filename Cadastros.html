<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes - Premium</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            /* Variáveis da página original */
            --primaria: #2E8B57;
            --primaria-hover: #3CB371;
            --preto-deep: #0F172A;
            --cinza-corpo: #64748B;
            --branco: #FFFFFF;
            --fundo-gradiente: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            
            /* Variáveis extras necessárias para o Menu */
            --cinza-fundo: #F8FAFC;
            --cinza-texto: #64748B;
            --cinza-borda: #E2E8F0;
            --vermelho-alerta: #EF4444;
            --verde-lucro: #10B981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--fundo-gradiente);
            color: var(--preto-deep);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-bottom: 100px; /* Impede que o conteúdo fique atrás do menu */
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* Topo com navegação */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .btn-voltar {
            background: var(--branco);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: 0.2s;
            color: var(--preto-deep);
        }

        .btn-voltar:hover { transform: translateX(-3px); background: #f1f5f9; }

        h2 { font-size: 1.5rem; font-weight: 700; margin: 0; letter-spacing: -0.025em; }

        /* Cards de Opção */
        .menu-grid { display: flex; flex-direction: column; gap: 18px; }

        .card-opcao {
            background: var(--branco);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            position: relative;
            overflow: hidden;
        }

        .card-opcao::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .card-opcao:hover::after { left: 100%; }
        .card-opcao:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }

        .icon-wrapper { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-right: 20px; }
        .btn-novo { background: var(--primaria); color: var(--branco); }
        .btn-novo .icon-wrapper { background: rgba(255, 255, 255, 0.2); }
        .btn-lista { background: var(--branco); color: var(--preto-deep); }
        .btn-lista .icon-wrapper { background: #f1f5f9; color: var(--primaria); }

        .texto-btn { display: flex; flex-direction: column; }
        .texto-btn b { font-size: 1.15rem; margin-bottom: 4px; }
        .texto-btn span { font-size: 0.85rem; opacity: 0.8; font-weight: 400; }

        .footer-info { margin-top: auto; padding: 20px; text-align: center; font-size: 0.85rem; color: var(--cinza-corpo); }

        /* --- ESTILOS DO MENU DE NAVEGAÇÃO E MODAIS --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--branco); display: flex; justify-content: space-around; padding: 12px 0 8px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--cinza-texto); text-decoration: none; font-size: 0.65rem; font-weight: 600; cursor: pointer; flex: 1; }
        .nav-item.ativo { color: var(--primaria); }
        .btn-add-center { position: relative; top: -20px; }
        .circulo-add { background: var(--primaria); border-radius: 50%; width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(46, 139, 87, 0.4); margin-bottom: 4px; transition: transform 0.2s; }
        .btn-add-center:active .circulo-add { transform: scale(0.95); }
        .btn-add-center span { color: var(--primaria); font-weight: 800; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: flex-end; justify-content: center; z-index: 100; }
        .modal { background: var(--branco); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 24px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 1.2rem; }
        .btn-fechar { background: none; border: none; cursor: pointer; color: var(--cinza-texto); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--cinza-texto); margin-bottom: 8px; }
        .form-group select { width: 100%; padding: 12px; border: 1px solid var(--cinza-borda); border-radius: 12px; font-size: 1rem; outline: none; background: white; }
        
        .btn-acao-modal { width: 100%; background: var(--preto-deep); color: var(--branco); border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; }
        .btn-acao-modal:hover { background: #1e293b; }
        .btn-whats { background: #25D366; }
        .btn-whats:hover { background: #128C7E; }

        /* --- ESTILOS PROFISSIONAIS DE IMPRESSÃO --- */
        #area-impressao { display: none; }
        @media print {
            body * { visibility: hidden; }
            body { background: white; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
            #area-impressao, #area-impressao * { visibility: visible; }
            #area-impressao { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 0; }
            
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            .print-header-azul { background-color: #002060 !important; color: white !important; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 0; }
            .print-header-verde { background-color: #00B050 !important; color: white !important; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 0; }
            .print-header-preto { background-color: #000000 !important; color: white !important; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 0; }
            
            .print-subtotais { display: flex; border-bottom: 2px solid #fff; }
            .print-sub-box { flex: 1; background-color: #808080 !important; color: white !important; padding: 10px; text-align: center; border-right: 2px solid #fff; }
            .print-sub-box:last-child { border-right: none; }
            .print-sub-box div { font-size: 12px; margin-bottom: 4px; }
            .print-sub-box span { font-size: 16px; font-weight: bold; }

            .print-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            .print-table th, .print-table td { border-bottom: 1px solid #ddd; padding: 8px; font-size: 12px; }
            .print-table th { background-color: #F2F2F2 !important; font-weight: bold; text-align: center; }
            .print-table td.col-desc { font-weight: bold; text-align: left; }
            .print-table td.col-valor { text-align: center; }
            .print-table tr:nth-child(even) { background-color: #FAFAFA !important; }
        }

        /* --- ESTILOS DO RELATÓRIO NA TELA --- */
        .btn-tela { background: #3B82F6; color: white; } 
        .btn-tela:hover { background: #2563EB; }

        .tabela-tela { width: 100%; border-collapse: collapse; font-size: 0.65rem; text-align: center; font-family: 'Inter', sans-serif; table-layout: fixed; }
        .tabela-tela td { border: 1px solid #94A3B8; padding: 6px 2px; word-wrap: break-word; }
        
        .tabela-tela .header-preto { background: #000000; color: #FFD700; text-transform: uppercase; font-weight: 800; font-size: 0.85rem; padding: 10px; }
        .tabela-tela .header-cinza { background: #808080; color: #FFFFFF; font-weight: bold; padding: 6px 2px; font-size: 0.65rem; }
        .tabela-tela .header-cinza span { font-size: 0.85rem; }
        
        .tabela-tela .col-left-mes { background: #808080; color: #FFFFFF; writing-mode: vertical-rl; transform: rotate(180deg); font-weight: bold; font-size: 0.75rem; padding: 0; }
        .tabela-tela .col-titulos td { background: #E2E8F0; font-weight: bold; padding: 4px 2px; }
        
        .tabela-tela tr:nth-child(even) { background: #F8FAFC; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <button class="btn-voltar" onclick="window.location.href='index.html'">
                <i data-lucide="chevron-left"></i>
            </button>
            <h2>Gestão de Clientes</h2>
        </header>

        <div class="menu-grid">
            <div class="card-opcao btn-novo" onclick="window.location.href='Cadastro_form.html'">
                <div class="icon-wrapper">
                    <i data-lucide="user-plus" size="32"></i>
                </div>
                <div class="texto-btn">
                    <b>Novo Cliente</b>
                    <span>Cadastrar novo cliente</span>
                </div>
            </div>

            <div class="card-opcao btn-lista" onclick="window.location.href='Lista_clientes.html'">
                <div class="icon-wrapper">
                    <i data-lucide="users" size="32"></i>
                </div>
                <div class="texto-btn">
                    <b>Lista de Clientes</b>
                    <span>Clientes, dividas, pagamentos</span>
                </div>
            </div>
        </div>

        <div class="footer-info">
            Sistema de Gestão Particular v1.0
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i>Início</a>
        <a href="Cadastros.html" class="nav-item ativo"><i data-lucide="wallet"></i>Carteira</a>
        
        <div class="nav-item btn-add-center" onclick="abrirModalAdicionar()">
            <div class="circulo-add">
                <i data-lucide="plus" color="#FFFFFF" size="28"></i>
            </div>
            <span>Ações</span>
        </div>

        <a href="Agenda.html" class="nav-item"><i data-lucide="calendar"></i>Agenda</a>
        <div class="nav-item" onclick="abrirModalRelatorio()"><i data-lucide="file-text"></i>Relatórios</div>
    </nav>

    <div class="overlay" id="modalRelatorio" onclick="fecharModalRelatorio()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Emitir Relatório</h3>
                <button class="btn-fechar" onclick="fecharModalRelatorio()"><i data-lucide="x"></i></button>
            </div>
            
            <div class="form-group">
                <label>Período de Análise</label>
                <select id="rel-periodo">
                    <option value="mes">Mês Atual</option>
                    <option value="semana">Esta Semana</option>
                    <option value="dia">Hoje</option>
                    <option value="tudo">Todo o Período</option>
                </select>
            </div>

            <div class="form-group">
                <label>Escopo do Relatório</label>
                <select id="rel-escopo" onchange="ajustarCamposRelatorio()">
                    <option value="geral">Geral (Todos os Clientes)</option>
                    <option value="cliente">Apenas de um Cliente</option>
                    <option value="divida">De uma Dívida Específica</option>
                </select>
            </div>

            <div class="form-group" id="grupo-rel-cliente" style="display: none;">
                <label>Selecione o Cliente</label>
                <select id="rel-cliente" onchange="carregarDividasDoClienteRelatorio()">
                    <option value="">Selecione...</option>
                </select>
            </div>

            <div class="form-group" id="grupo-rel-divida" style="display: none;">
                <label>Selecione a Dívida</label>
                <select id="rel-divida">
                    <option value="">Aguardando cliente...</option>
                </select>
            </div>

            <button class="btn-acao-modal" onclick="acionarRelatorio('print')"><i data-lucide="printer"></i> Imprimir / Salvar PDF</button>
            <button class="btn-acao-modal btn-whats" onclick="acionarRelatorio('whatsapp')"><i data-lucide="send"></i> Enviar Resumo no WhatsApp</button>
            <button class="btn-acao-modal btn-tela" onclick="mostrarRelatorioTela()"><i data-lucide="monitor"></i> Mostrar na Tela (Este Mês)</button>
        </div>
    </div>

    <div class="overlay" id="modalRelatorioTela" onclick="fecharModalRelatorioTela()">
        <div class="modal" onclick="event.stopPropagation()" style="max-width: 95vw; padding: 16px; border-radius: 16px;">
            <div class="modal-header" style="margin-bottom: 12px;">
                <h3 style="font-size: 1.1rem;">Relatório do Mês</h3>
                <button class="btn-fechar" onclick="fecharModalRelatorioTela()"><i data-lucide="x"></i></button>
            </div>
            
            <div id="conteudo-relatorio-tela" style="overflow-x: auto; border-radius: 8px; border: 1px solid #94A3B8;">
                </div>
        </div>
    </div>

    <div id="area-impressao"></div>

    <script src="banco.js"></script>
    <script>
        // --- FUNÇÕES DO MENU DE AÇÕES ---
        function abrirModalAdicionar() {
            document.getElementById('modalAdicionar').style.display = 'flex';
            voltarOpcoesAdicionar(); 
            popularSelectClientesMenu();
        }
        function fecharModalAdicionar() { document.getElementById('modalAdicionar').style.display = 'none'; }
        
        function mostrarSelectNovaDivida() {
            document.getElementById('opcoes-adicionar').style.display = 'none';
            document.getElementById('selecao-cliente-divida').style.display = 'block';
        }
        function voltarOpcoesAdicionar() {
            document.getElementById('opcoes-adicionar').style.display = 'block';
            document.getElementById('selecao-cliente-divida').style.display = 'none';
        }
        function irParaNovaDivida() {
            const cli = document.getElementById('select-cliente-nova-divida').value;
            if (!cli) return alert("Selecione um cliente.");
            window.location.href = `novadiv.html?cliente=${encodeURIComponent(cli)}`;
        }
        function popularSelectClientesMenu() {
            const dadosMenu = Banco.getDados(); 
            const selectAdd = document.getElementById('select-cliente-nova-divida');
            const optionsHTML = '<option value="">Selecione...</option>' + 
                (dadosMenu.clientes || []).sort((a,b) => a.nome.localeCompare(b.nome))
                .map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            if(selectAdd) selectAdd.innerHTML = optionsHTML;
        }

        // --- SISTEMA DE RELATÓRIOS AVANÇADOS ---
        function abrirModalRelatorio() { document.getElementById('modalRelatorio').style.display = 'flex'; popularSelectsRelatorio(); ajustarCamposRelatorio(); }
        function fecharModalRelatorio() { document.getElementById('modalRelatorio').style.display = 'none'; }
        
        function popularSelectsRelatorio() {
            const dadosRel = Banco.getDados();
            const options = '<option value="">Selecione...</option>' + 
                (dadosRel.clientes || []).sort((a,b) => a.nome.localeCompare(b.nome))
                .map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            
            const selRel = document.getElementById('rel-cliente');
            if(selRel) selRel.innerHTML = options;
        }

        function ajustarCamposRelatorio() {
            const escopo = document.getElementById('rel-escopo').value;
            document.getElementById('grupo-rel-cliente').style.display = (escopo === 'cliente' || escopo === 'divida') ? 'block' : 'none';
            document.getElementById('grupo-rel-divida').style.display = (escopo === 'divida') ? 'block' : 'none';
        }

        function carregarDividasDoClienteRelatorio() {
            const cliNome = document.getElementById('rel-cliente').value;
            const selectDiv = document.getElementById('rel-divida');
            selectDiv.innerHTML = '<option value="">Selecione...</option>';
            if (!cliNome) return;
            const dadosRel = Banco.getDados();
            const cliente = dadosRel.clientes.find(c => c.nome === cliNome);
            if (cliente && cliente.dividas) {
                cliente.dividas.forEach(d => selectDiv.innerHTML += `<option value="${d.titulo}">${d.titulo}</option>`);
            }
        }

        function formatarDataISO_Relatorio(dataStr) {
            if (!dataStr) return null;
            let iso = dataStr;
            if (dataStr.includes('/')) {
                const p = dataStr.split('/');
                iso = `${p[2]}-${p[1]}-${p[0]}`;
            }
            return { iso: iso, obj: new Date(iso + 'T12:00:00') };
        }

        function estaNoPeriodo(dataISO, periodo) {
            if (periodo === 'tudo') return true;
            if (!dataISO) return false;
            const d = new Date(dataISO + 'T12:00:00');
            const hoje = new Date(), mesAtual = hoje.getMonth(), anoAtual = hoje.getFullYear();
            if (periodo === 'dia') return dataISO === hoje.toISOString().split('T')[0];
            if (periodo === 'mes') return d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
            if (periodo === 'semana') {
                const dom = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() - hoje.getDay());
                const sab = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() - hoje.getDay() + 6, 23, 59, 59);
                return d >= dom && d <= sab;
            }
            return false;
        }

        function gerarTextoCabecalho(periodo) {
            const hoje = new Date();
            const meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
            if (periodo === 'mes') return `${meses[hoje.getMonth()]}/${hoje.getFullYear()}`;
            if (periodo === 'dia') return `${hoje.toLocaleDateString('pt-BR')}`;
            if (periodo === 'semana') {
                const dom = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() - hoje.getDay());
                const sab = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() - hoje.getDay() + 6);
                return `${dom.getDate()} A ${sab.getDate()} DE ${meses[sab.getMonth()]}/${sab.getFullYear()}`;
            }
            return "TODO O PERÍODO";
        }

        function acionarRelatorio(acao) {
            const periodo = document.getElementById('rel-periodo').value;
            const escopo = document.getElementById('rel-escopo').value;
            const cliNome = document.getElementById('rel-cliente').value;
            const divTitulo = document.getElementById('rel-divida').value;

            if ((escopo === 'cliente' || escopo === 'divida') && !cliNome) return alert("Selecione o Cliente.");
            if (escopo === 'divida' && !divTitulo) return alert("Selecione a Dívida.");

            const textoPeriodo = gerarTextoCabecalho(periodo);
            let sumReceber = 0, sumRecebido = 0;
            let htmlLinhas = "", whatsTexto = "";

            if (escopo === 'geral' || escopo === 'cliente') {
                whatsTexto += `*RELATÓRIO ${textoPeriodo}*\n`;
                if(escopo === 'cliente') whatsTexto += `Cliente: ${cliNome}\n`;
                whatsTexto += `------------------------\n`;

                dadosGerais.clientes.forEach(c => {
                    if (escopo === 'cliente' && c.nome !== cliNome) return;
                    if(!c.dividas) return;
                    
                    c.dividas.forEach(d => {
                        if(!d.parcelas) return;
                        d.parcelas.forEach(p => {
                            const vencISO = formatarDataISO(p.dataVencimento || p.vencimento)?.iso;
                            if (estaNoPeriodo(vencISO, periodo)) {
                                const vParc = parseFloat(p.valor || 0);
                                const vPago = parseFloat(p.pago || 0);
                                sumReceber += vParc; sumRecebido += vPago;
                                
                                const descParc = p.isQuitacao ? "Parc Quitação" : `Parc ${p.numero}`;
                                const numF = vParc.toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
                                const pgoF = vPago.toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
                                
                                htmlLinhas += `<tr>
                                    <td class="col-desc"><b>${c.nome.toUpperCase()}</b> > ${d.titulo} > ${descParc}</td>
                                    <td class="col-valor">${numF}</td>
                                    <td class="col-valor">${pgoF}</td>
                                </tr>`;
                                
                                whatsTexto += `👤 *${c.nome}* > ${d.titulo} > ${descParc}\n💰 Rec: ${numF} | ✅ Pago: ${pgoF}\n\n`;
                            }
                        });
                    });
                });

                const tituloImpresso = escopo === 'geral' ? `RELATÓRIO ${textoPeriodo}` : `RELATÓRIO ${textoPeriodo} (CLIENTE: ${cliNome})`;
                const classeCor = escopo === 'geral' ? 'print-header-azul' : 'print-header-verde';

                document.getElementById('area-impressao').innerHTML = `
                    <div class="${classeCor}">${tituloImpresso}</div>
                    <div class="print-subtotais">
                        <div class="print-sub-box"><div>Total a receber:</div><span>${sumReceber.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span></div>
                        <div class="print-sub-box"><div>Total recebido:</div><span>${sumRecebido.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span></div>
                    </div>
                    <table class="print-table"><tbody>${htmlLinhas || '<tr><td colspan="3" align="center">Nenhum dado no período.</td></tr>'}</tbody></table>
                `;

                whatsTexto = `*RESUMO TOTAIS:*\nEsperado: ${sumReceber.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}\nRecebido: ${sumRecebido.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}\n\n${whatsTexto}`;
            
            } else if (escopo === 'divida') {
                const cliente = dadosGerais.clientes.find(c => c.nome === cliNome);
                const divida = cliente.dividas.find(d => d.titulo === divTitulo);
                const dtEmp = divida.data || '---';
                const td = parseFloat(divida.valorTotal || 0).toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
                
                // --- CORREÇÃO AQUI: Somar o valor pago de todas as parcelas na hora ---
                let somaTotalPagoDaDivida = 0;
                if(divida.parcelas) {
                    divida.parcelas.forEach(p => {
                        somaTotalPagoDaDivida += parseFloat(p.pago || 0);
                    });
                }
                const tp = somaTotalPagoDaDivida.toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
                // ------------------------------------------------------------------------

                whatsTexto += `*RELATÓRIO DE CONTRATO*\n👤 Cliente: ${cliNome}\n📄 Ref: ${divTitulo}\n📅 Data Emp: ${dtEmp}\n\n*Resumo:*\nTotal Dívida: ${td}\nTotal Pago: ${tp}\n------------------------\n`;

                if(divida.parcelas) {
                    divida.parcelas.forEach(p => {
                        const vObj = formatarDataISO(p.dataVencimento || p.vencimento);
                        const dtFormat = vObj ? vObj.iso.split('-').reverse().join('/') : '---';
                        
                        const desc = p.isQuitacao ? `${p.numero}º - Quitação` : `${p.numero}º`;
                        const vF = parseFloat(p.valor || 0).toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
                        const pF = parseFloat(p.pago || 0).toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
                        
                        htmlLinhas += `<tr><td class="col-valor">${desc}</td><td class="col-valor">${dtFormat}</td><td class="col-valor">${vF}</td><td class="col-valor">${pF}</td></tr>`;
                        whatsTexto += `Parc ${desc} | Venc: ${dtFormat}\n💰 ${vF} | ✅ ${pF}\n\n`;
                    });
                }

                document.getElementById('area-impressao').innerHTML = `
                    <div class="print-header-preto">RELATÓRIO CLIENTE: ${cliNome.toUpperCase()} > ${divida.titulo.toUpperCase()}</div>
                    <div class="print-subtotais">
                        <div class="print-sub-box"><div>Data Empréstimo:</div><span>${dtEmp}</span></div>
                        <div class="print-sub-box"><div>Total Dívida:</div><span>${td}</span></div>
                        <div class="print-sub-box"><div>Total Pago:</div><span>${tp}</span></div>
                    </div>
                    <table class="print-table">
                        <thead><tr><th>Parcela</th><th>Vencimento</th><th>Valor Esperado</th><th>Valor Pago</th></tr></thead>
                        <tbody>${htmlLinhas || '<tr><td colspan="4" align="center">Sem parcelas.</td></tr>'}</tbody>
                    </table>
                `;
            }

            if (acao === 'print') {
                fecharModalRelatorio();
                window.print();
            } else if (acao === 'whatsapp') {
                const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(whatsTexto)}`;
                window.open(url, '_blank');
            }
        }

        // --- SISTEMA DE RELATÓRIO NA TELA (MÊS ATUAL) ---
        function fecharModalRelatorioTela() {
            document.getElementById('modalRelatorioTela').style.display = 'none';
        }

        function mostrarRelatorioTela() {
            fecharModalRelatorio();
            document.getElementById('modalRelatorioTela').style.display = 'flex';

            const dadosRel = Banco.getDados();
            let parcelasMes = [];
            let totalReceber = 0, totalRecebido = 0;
            const hoje = new Date(), mesAtual = hoje.getMonth(), anoAtual = hoje.getFullYear();

            // Extrair e filtrar apenas parcelas deste mês
            (dadosRel.clientes || []).forEach(c => {
                (c.dividas || []).forEach(d => {
                    (d.parcelas || []).forEach(p => {
                        // Nas páginas Cadastros e Agenda, a função correta é essa abaixo:
                        const vObj = formatarDataISO_Relatorio(p.dataVencimento || p.vencimento);
                        
                        if (vObj && vObj.obj.getMonth() === mesAtual && vObj.obj.getFullYear() === anoAtual) {
                            const valParcela = parseFloat(p.valor || 0);
                            const valPago = parseFloat(p.pago || 0);
                            
                            totalReceber += valParcela; 
                            totalRecebido += valPago;

                            parcelasMes.push({
                                cliente: c.nome,
                                frequencia: d.frequencia || 'Mensal', 
                                vencimentoISO: vObj.iso,
                                vencimentoFormatado: vObj.iso.split('-').reverse().join('/'),
                                valor: valParcela,
                                pago: valPago
                            });
                        }
                    });
                });
            });

            // ORDENAR por data
            parcelasMes.sort((a, b) => a.vencimentoISO.localeCompare(b.vencimentoISO));

            // Montar as linhas (Abreviadas)
            let linhasHTML = "";
            parcelasMes.forEach(p => {
                let freqCurta = p.frequencia.substring(0,3) + "."; 
                let vencCurto = p.vencimentoFormatado.substring(0,5); 

                linhasHTML += `
                    <tr>
                        <td style="text-align: left; padding-left: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${p.cliente}</td>
                        <td>${freqCurta}</td>
                        <td>${vencCurto}</td>
                        <td>${p.valor.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</td>
                        <td>${p.pago.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</td>
                    </tr>
                `;
            });

            if(parcelasMes.length === 0) {
                linhasHTML = `<tr><td colspan="5" style="padding: 20px; text-align: center; color: #64748B;">Nenhuma parcela encontrada.</td></tr>`;
            }

            const numLinhas = parcelasMes.length > 0 ? parcelasMes.length : 1;
            const rowspanTotal = numLinhas + 2; 

            // Montar Tabela Final com larguras exatas
            const htmlFinal = `
                <table class="tabela-tela">
                    <colgroup>
                        <col style="width: 6%;">  
                        <col style="width: 28%;"> 
                        <col style="width: 12%;"> 
                        <col style="width: 14%;"> 
                        <col style="width: 20%;"> 
                        <col style="width: 20%;"> 
                    </colgroup>
                    <tbody>
                        <tr>
                            <td colspan="6" class="header-preto">RELATÓRIO FINANCEIRO</td>
                        </tr>
                        <tr>
                            <td rowspan="${rowspanTotal}" class="col-left-mes">Este mês</td>
                            <td colspan="3" class="header-cinza">Total a Receber:<br><span>${totalReceber.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span></td>
                            <td colspan="2" class="header-cinza">Total Recebido:<br><span>${totalRecebido.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})}</span></td>
                        </tr>
                        <tr class="col-titulos">
                            <td>Cliente</td>
                            <td>Freq.</td>
                            <td>Venc.</td>
                            <td>A Receber</td>
                            <td>Recebido</td>
                        </tr>
                        ${linhasHTML}
                    </tbody>
                </table>
            `;

            document.getElementById('conteudo-relatorio-tela').innerHTML = htmlFinal;
        }

        lucide.createIcons();
    </script>
