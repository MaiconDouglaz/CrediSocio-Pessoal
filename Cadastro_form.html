<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente - Premium</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primaria: #2E8B57;
            --primaria-hover: #3CB371;
            --preto-deep: #0F172A;
            --cinza-claro: #F1F5F9;
            --cinza-texto: #64748B;
            --branco: #FFFFFF;
            --fundo-gradiente: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--fundo-gradiente); color: var(--preto-deep); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 24px; box-sizing: border-box; }
        header { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
        .btn-voltar { background: var(--branco); border: none; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { font-size: 1.3rem; margin: 0; font-weight: 700; }
        .form-group { margin-bottom: 20px; background: var(--branco); padding: 12px 16px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border: 1px solid rgba(255,255,255,0.8); }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--cinza-texto); margin-bottom: 4px; text-transform: uppercase; }
        .input-wrapper { display: flex; align-items: center; gap: 12px; }
        .input-wrapper i { color: var(--primaria); }
        input { border: none; width: 100%; font-size: 1rem; outline: none; color: var(--preto-deep); background: transparent; }
        .btn-salvar { width: 100%; background: var(--primaria); color: var(--branco); border: none; padding: 18px; border-radius: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 15px -3px rgba(46, 139, 87, 0.3); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <button class="btn-voltar" onclick="window.location.href='Cadastros.html'">
                <i data-lucide="chevron-left"></i>
            </button>
            <h2>Novo Cliente</h2>
        </header>

        <form id="formCadastro">
            <div class="form-group">
                <label>Nome Completo</label>
                <div class="input-wrapper">
                    <i data-lucide="user" size="18"></i>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>
            </div>

            <div class="form-group">
                <label>Celular / WhatsApp</label>
                <div class="input-wrapper">
                    <i data-lucide="phone" size="18"></i>
                    <input type="tel" id="celular" placeholder="(51) 99999-9999" required>
                </div>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" size="18"></i>
                    <input type="email" id="email" placeholder="cliente@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>Endereço</label>
                <div class="input-wrapper">
                    <i data-lucide="map-pin" size="18"></i>
                    <input type="text" id="endereco" placeholder="Rua, Número, Bairro">
                </div>
            </div>

            <button type="button" class="btn-salvar" onclick="salvarNovoCliente()">
                <i data-lucide="check-circle"></i>
                Salvar Cadastro
            </button>
        </form>
    </div>

    <script src="banco.js"></script>
    <script>
        lucide.createIcons();

        function salvarNovoCliente() {
            const nomeInput = document.getElementById('nome').value;
            
            if (!nomeInput.trim()) {
                alert("Por favor, preencha o nome do cliente.");
                return;
            }

            // Criamos o objeto seguindo o padrão do banco
            const novoCliente = {
                id: Date.now(),
                nome: nomeInput.trim(),
                celular: document.getElementById('celular').value,
                email: document.getElementById('email').value,
                endereco: document.getElementById('endereco').value,
                dividas: []
            };

            // Usamos a função do banco para salvar
            const sucesso = Banco.adicionarCliente(novoCliente);

            if (sucesso) {
                alert("Cliente " + novoCliente.nome + " cadastrado com sucesso!");
                window.location.href = 'Cadastros.html';
            } else {
                alert("Este cliente já está cadastrado!");
            }
        }
    </script>
</body>
</html>
